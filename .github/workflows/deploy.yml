name: Build and Deploy to Azure

on:
  push:
    branches:
      - main

env:
  ACR_NAME: schoolacr2026
  IMAGE_NAME: school-api
  WEB_APP_NAME: school-api-prod

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Login to Azure
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Login to ACR
      run: az acr login --name $ACR_NAME

    - name: Build Docker Image
      run: |
        docker build -t $ACR_NAME.azurecr.io/$IMAGE_NAME:${{ github.sha }} .

    - name: Push Image
      run: |
        docker push $ACR_NAME.azurecr.io/$IMAGE_NAME:${{ github.sha }}

    - name: Update Web App Image
      run: |
        az webapp config container set \
          --resource-group school-rg \
          --name $WEB_APP_NAME \
          --docker-custom-image-name $ACR_NAME.azurecr.io/$IMAGE_NAME:${{ github.sha }}
